{% extends "base.html" %}

{% block title %}
Edit Book
{% endblock %}

{% block content %}

<h2>✏️ Edit Book</h2>

<form method="POST">

    <label>Title</label><br>
    <input
        type="text"
        name="title"
        value="{{ book[1] }}"
        required>

    <br><br>

    <label>Author</label><br>
    <input
        type="text"
        name="author"
        value="{{ book[2] }}"
        required>

    <br><br>

    <label>Category</label><br>
    <input
        type="text"
        name="category"
        value="{{ book[3] }}"
        required>

    <br><br>

    <label>Quantity</label><br>
    <input
        type="number"
        name="quantity"
        value="{{ book[4] }}"
        required>

    <br><br>

    <button type="submit">
        Update Book
    </button>

</form>

{% endblock %}
