{% extends "base.html" %}

{% block title %}
Edit Member
{% endblock %}

{% block content %}

<h2>✏️ Edit Member</h2>

<form method="POST">

<label>Name</label><br>

<input
type="text"
name="name"
value="{{ member[1] }}"
required>

<br><br>

<label>Email</label><br>

<input
type="email"
name="email"
value="{{ member[2] }}"
required>

<br><br>

<label>Phone</label><br>

<input
type="text"
name="phone"
value="{{ member[3] }}"
required>

<br><br>

<button type="submit">

Update Member

</button>

</form>

{% endblock %}
